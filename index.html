<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hogwarts Sorting Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=Kanit:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&display=swap" rel="stylesheet">
<script defer src="/_vercel/insights/script.js"></script>
<style>
  :root {
    --gold: #C9A84C;
    --gold-light: #F0D080;
    --gold-dark: #8B6914;
    --parchment: #F5E8C8;
    --ink: #1A0F00;
    --bg-deep: #0A0812;
    --bg-mid: #100E1A;
    --gryffindor-primary: #740001;
    --gryffindor-accent: #D3A625;
    --hufflepuff-primary: #ECB939;
    --hufflepuff-accent: #372E29;
    --ravenclaw-primary: #0E1A40;
    --ravenclaw-accent: #946B2D;
    --slytherin-primary: #1A472A;
    --slytherin-accent: #AAAAAA;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Crimson Text', 'Kanit', serif;
    background: var(--bg-deep);
    color: var(--parchment);
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  #stars-canvas {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
  }

  .particle {
    position: fixed;
    width: 4px; height: 4px;
    border-radius: 50%;
    background: var(--gold-light);
    opacity: 0;
    pointer-events: none;
    z-index: 1;
    animation: floatUp 8s infinite;
  }

  @keyframes floatUp {
    0% { transform: translateY(100vh) scale(0); opacity: 0; }
    10% { opacity: 0.6; }
    90% { opacity: 0.2; }
    100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
  }

  #lang-btn {
    position: fixed;
    top: 16px; right: 16px;
    z-index: 100;
    background: rgba(201,168,76,0.15);
    border: 1px solid var(--gold);
    color: var(--gold);
    font-family: 'Cinzel', serif;
    font-size: 12px;
    letter-spacing: 1px;
    padding: 8px 14px;
    border-radius: 20px;
    cursor: pointer;
    backdrop-filter: blur(8px);
    transition: all 0.3s;
  }
  #lang-btn:hover { background: var(--gold); color: var(--bg-deep); }

  #app {
    position: relative;
    z-index: 10;
    max-width: 480px;
    margin: 0 auto;
    min-height: 100vh;
    padding: 20px 16px 40px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .crest-svg {
    width: 90px; height: 90px;
    margin-bottom: 8px;
    filter: drop-shadow(0 0 20px rgba(201,168,76,0.5));
    animation: floatBob 4s ease-in-out infinite;
  }
  @keyframes floatBob {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }

  .title-block { text-align: center; margin-bottom: 24px; }
  .title-en {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(18px, 5vw, 26px);
    color: var(--gold-light);
    text-shadow: 0 0 30px rgba(201,168,76,0.6);
    line-height: 1.2;
  }
  .title-sub {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--gold-dark);
    margin-top: 4px;
    text-transform: uppercase;
  }

  .card {
    width: 100%;
    background: linear-gradient(145deg, rgba(20,16,36,0.95), rgba(10,8,18,0.98));
    border: 1px solid rgba(201,168,76,0.3);
    border-radius: 20px;
    padding: 28px 24px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.6), inset 0 1px 0 rgba(201,168,76,0.2);
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute;
    top: -50%; left: -50%;
    width: 200%; height: 200%;
    background: radial-gradient(ellipse at center, rgba(201,168,76,0.04) 0%, transparent 60%);
    pointer-events: none;
  }

  .progress-label {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--gold-dark);
    text-align: center;
    margin-bottom: 8px;
  }
  .progress-bar-bg {
    height: 6px;
    background: rgba(201,168,76,0.1);
    border-radius: 3px;
    overflow: hidden;
    border: 1px solid rgba(201,168,76,0.2);
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--gold-dark), var(--gold-light));
    border-radius: 3px;
    transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 0 0 10px rgba(201,168,76,0.5);
  }
  .progress-dots { display: flex; justify-content: center; gap: 8px; margin-top: 8px; }
  .progress-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    border: 1px solid rgba(201,168,76,0.4);
    background: transparent;
    transition: all 0.4s;
  }
  .progress-dot.active { background: var(--gold); border-color: var(--gold); box-shadow: 0 0 8px var(--gold); }
  .progress-dot.done { background: var(--gold-dark); border-color: var(--gold-dark); }

  .question-num {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--gold-dark);
    text-align: center;
    margin-bottom: 12px;
    text-transform: uppercase;
  }
  .question-icon {
    font-size: 36px;
    text-align: center;
    margin-bottom: 12px;
    display: block;
    animation: iconPop 0.5s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes iconPop {
    from { transform: scale(0) rotate(-10deg); opacity: 0; }
    to { transform: scale(1) rotate(0deg); opacity: 1; }
  }
  .question-text {
    font-family: 'Crimson Text', 'Kanit', serif;
    font-size: 20px;
    line-height: 1.5;
    text-align: center;
    color: var(--parchment);
    margin-bottom: 24px;
    min-height: 60px;
  }

  .options-grid { display: flex; flex-direction: column; gap: 10px; }
  .option-btn {
    width: 100%;
    background: rgba(201,168,76,0.05);
    border: 1px solid rgba(201,168,76,0.25);
    border-radius: 12px;
    padding: 14px 16px;
    cursor: pointer;
    color: var(--parchment);
    font-family: 'Crimson Text', 'Kanit', serif;
    font-size: 16px;
    line-height: 1.4;
    text-align: left;
    display: flex;
    align-items: center;
    gap: 12px;
    transition: all 0.25s;
    position: relative;
    overflow: hidden;
  }
  .option-btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(201,168,76,0.08), transparent);
    opacity: 0;
    transition: opacity 0.3s;
  }
  .option-btn:hover { border-color: var(--gold); transform: translateX(4px); }
  .option-btn:hover::after { opacity: 1; }
  .option-btn:active { transform: scale(0.98); }
  .option-btn.selected { border-color: var(--gold); background: rgba(201,168,76,0.12); transform: translateX(0); }
  .option-letter {
    width: 28px; height: 28px;
    border-radius: 50%;
    border: 1px solid rgba(201,168,76,0.4);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Cinzel', serif;
    font-size: 12px;
    color: var(--gold);
    flex-shrink: 0;
    transition: all 0.25s;
  }
  .option-btn:hover .option-letter,
  .option-btn.selected .option-letter { background: var(--gold); color: var(--bg-deep); border-color: var(--gold); }

  .next-btn {
    width: 100%;
    margin-top: 16px;
    padding: 14px;
    background: linear-gradient(135deg, var(--gold-dark), var(--gold), var(--gold-dark));
    background-size: 200% 100%;
    border: none;
    border-radius: 12px;
    font-family: 'Cinzel', serif;
    font-size: 14px;
    letter-spacing: 2px;
    color: var(--bg-deep);
    cursor: pointer;
    transition: all 0.35s;
    text-transform: uppercase;
    opacity: 0;
    pointer-events: none;
    position: relative;
    overflow: hidden;
  }
  .next-btn.visible { opacity: 1; pointer-events: all; animation: btnReveal 0.4s cubic-bezier(0.34,1.56,0.64,1); }
  @keyframes btnReveal {
    from { transform: translateY(10px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
  .next-btn:hover { background-position: 100% 0; transform: translateY(-2px); box-shadow: 0 6px 20px rgba(201,168,76,0.4); }
  .next-btn:active { transform: scale(0.98); }

  .slide-out-left { animation: slideOutLeft 0.4s forwards; }
  @keyframes slideOutLeft { to { transform: translateX(-50px); opacity: 0; } }

  .intro-desc {
    font-family: 'Crimson Text', 'Kanit', serif;
    font-size: 18px;
    line-height: 1.7;
    text-align: center;
    color: rgba(245,232,200,0.8);
    margin-bottom: 24px;
  }
  .intro-houses { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 24px; }
  .house-mini { border-radius: 12px; padding: 14px 10px; text-align: center; border: 1px solid; transition: transform 0.3s; }
  .house-mini:hover { transform: scale(1.04); }
  .house-mini.g { background: rgba(116,0,1,0.3); border-color: rgba(211,166,37,0.5); }
  .house-mini.h { background: rgba(236,185,57,0.2); border-color: rgba(236,185,57,0.5); }
  .house-mini.r { background: rgba(14,26,64,0.5); border-color: rgba(148,107,45,0.5); }
  .house-mini.s { background: rgba(26,71,42,0.3); border-color: rgba(170,170,170,0.5); }
  .house-mini .hmoji { font-size: 24px; display: block; margin-bottom: 4px; }
  .house-mini .hname { font-family: 'Cinzel', serif; font-size: 10px; letter-spacing: 1px; display: block; }
  .house-mini.g .hname { color: var(--gryffindor-accent); }
  .house-mini.h .hname { color: var(--hufflepuff-primary); }
  .house-mini.r .hname { color: var(--ravenclaw-accent); }
  .house-mini.s .hname { color: var(--slytherin-accent); }

  .start-btn {
    width: 100%;
    padding: 16px;
    background: transparent;
    border: 1px solid var(--gold);
    border-radius: 14px;
    font-family: 'Cinzel', serif;
    font-size: 15px;
    letter-spacing: 3px;
    color: var(--gold-light);
    cursor: pointer;
    transition: all 0.35s;
    text-transform: uppercase;
    position: relative;
    overflow: hidden;
  }
  .start-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, var(--gold-dark), var(--gold));
    opacity: 0;
    transition: opacity 0.35s;
  }
  .start-btn:hover { color: var(--bg-deep); }
  .start-btn:hover::before { opacity: 1; }
  .start-btn span { position: relative; z-index: 1; }

  /* neon pulse when a house card was tapped */
  .start-btn.neon {
    border-color: var(--gold-light);
    color: var(--gold-light);
    animation: neonPulse 1.4s ease-in-out infinite;
  }
  .start-btn.neon::after {
    content: '';
    position: absolute;
    inset: -3px;
    border-radius: 16px;
    background: transparent;
    border: 2px solid var(--gold-light);
    opacity: 0;
    animation: neonRing 1.4s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes neonPulse {
    0%,100% { box-shadow: 0 0 8px rgba(240,208,128,0.5), 0 0 20px rgba(240,208,128,0.3); }
    50%      { box-shadow: 0 0 18px rgba(240,208,128,0.9), 0 0 40px rgba(240,208,128,0.5), 0 0 60px rgba(201,168,76,0.3); }
  }
  @keyframes neonRing {
    0%   { transform: scale(1);   opacity: 0.6; }
    100% { transform: scale(1.08); opacity: 0; }
  }

  /* house-mini click highlight */
  .house-mini.selected-house { transform: scale(1.07) !important; }
  .house-mini.g.selected-house { border-color: #D3A625; box-shadow: 0 0 14px rgba(211,166,37,0.6); }
  .house-mini.h.selected-house { border-color: #ECB939; box-shadow: 0 0 14px rgba(236,185,57,0.6); }
  .house-mini.r.selected-house { border-color: #946B2D; box-shadow: 0 0 14px rgba(148,107,45,0.6); }
  .house-mini.s.selected-house { border-color: #AAAAAA; box-shadow: 0 0 14px rgba(170,170,170,0.5); }

  /* ── NEXT-BTN DISABLED STATE ── */
  .next-btn.disabled-state {
    opacity: 0.35;
    pointer-events: none;
    cursor: not-allowed;
    filter: grayscale(0.4);
  }

  .result-wrap { text-align: center; }
  .house-banner {
    width: 100%;
    border-radius: 20px;
    padding: 32px 20px;
    margin-bottom: 20px;
    position: relative;
    overflow: hidden;
    border: 2px solid;
    animation: bannerReveal 0.8s cubic-bezier(0.34,1.56,0.64,1) forwards;
  }
  @keyframes bannerReveal {
    from { transform: scale(0.8); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }
  .house-banner.gryffindor { background: linear-gradient(145deg, #3D0000, #740001, #1A0000); border-color: var(--gryffindor-accent); box-shadow: 0 0 60px rgba(211,166,37,0.3), inset 0 0 40px rgba(116,0,1,0.5); }
  .house-banner.hufflepuff { background: linear-gradient(145deg, #5C4000, #ECB939, #3A2800); border-color: var(--hufflepuff-accent); box-shadow: 0 0 60px rgba(236,185,57,0.4), inset 0 0 40px rgba(55,46,41,0.5); }
  .house-banner.ravenclaw { background: linear-gradient(145deg, #050B1E, #0E1A40, #020510); border-color: var(--ravenclaw-accent); box-shadow: 0 0 60px rgba(148,107,45,0.3), inset 0 0 40px rgba(14,26,64,0.5); }
  .house-banner.slytherin { background: linear-gradient(145deg, #081B10, #1A472A, #040D08); border-color: var(--slytherin-accent); box-shadow: 0 0 60px rgba(170,170,170,0.2), inset 0 0 40px rgba(26,71,42,0.5); }

  .house-crest-big { font-size: 80px; display: block; margin-bottom: 12px; animation: crestSpin 1s cubic-bezier(0.34,1.56,0.64,1); filter: drop-shadow(0 0 20px currentColor); }
  @keyframes crestSpin {
    from { transform: rotateY(90deg) scale(0.5); opacity: 0; }
    to { transform: rotateY(0deg) scale(1); opacity: 1; }
  }
  .house-result-name { font-family: 'Cinzel Decorative', serif; font-size: clamp(22px, 6vw, 32px); font-weight: 700; display: block; text-shadow: 0 0 20px currentColor; margin-bottom: 6px; }
  .house-banner.gryffindor .house-result-name { color: var(--gryffindor-accent); }
  .house-banner.hufflepuff .house-result-name { color: var(--hufflepuff-accent); }
  .house-banner.ravenclaw .house-result-name { color: var(--ravenclaw-accent); }
  .house-banner.slytherin .house-result-name { color: var(--slytherin-accent); }
  .house-motto { font-family: 'Crimson Text', serif; font-style: italic; font-size: 14px; color: rgba(245,232,200,0.7); letter-spacing: 1px; }

  .traits-section { margin-bottom: 20px; }
  .traits-title { font-family: 'Cinzel', serif; font-size: 11px; letter-spacing: 3px; color: var(--gold-dark); text-transform: uppercase; margin-bottom: 12px; }
  .traits-grid { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
  .trait-pill {
    background: rgba(201,168,76,0.1);
    border: 1px solid rgba(201,168,76,0.3);
    border-radius: 20px;
    padding: 6px 14px;
    font-family: 'Crimson Text', 'Kanit', serif;
    font-size: 14px;
    color: var(--gold-light);
    animation: pillPop 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
  }
  @keyframes pillPop { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }

  .house-desc { font-family: 'Crimson Text', 'Kanit', serif; font-size: 17px; line-height: 1.7; color: rgba(245,232,200,0.85); text-align: center; margin-bottom: 20px; }

  .result-actions { display: flex; flex-direction: column; gap: 10px; width: 100%; }

  .share-btn {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, rgba(201,168,76,0.18), rgba(201,168,76,0.08));
    border: 1px solid rgba(201,168,76,0.6);
    border-radius: 12px;
    font-family: 'Cinzel', serif;
    font-size: 13px;
    letter-spacing: 2px;
    color: var(--gold-light);
    cursor: pointer;
    transition: all 0.3s;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }
  .share-btn:hover { background: linear-gradient(135deg, rgba(201,168,76,0.3), rgba(201,168,76,0.15)); border-color: var(--gold-light); transform: translateY(-2px); box-shadow: 0 6px 20px rgba(201,168,76,0.25); }
  .share-btn:active { transform: scale(0.98); }
  .share-btn svg { flex-shrink: 0; }
  .share-btn.loading { opacity: 0.7; pointer-events: none; cursor: default; }
  .share-btn .share-spinner { display: none; width: 16px; height: 16px; border: 2px solid rgba(201,168,76,0.3); border-top-color: var(--gold-light); border-radius: 50%; animation: spin 0.7s linear infinite; flex-shrink: 0; }
  .share-btn.loading .share-spinner { display: block; }
  .share-btn.loading .share-icon { display: none; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .download-btn {
    width: 100%;
    padding: 14px;
    background: transparent;
    border: 1px solid rgba(201,168,76,0.45);
    border-radius: 12px;
    font-family: 'Kanit', 'Cinzel', serif;
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 1px;
    color: var(--gold-light);
    cursor: pointer;
    transition: all 0.3s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }
  .download-btn:hover { border-color: var(--gold-light); background: rgba(201,168,76,0.08); transform: translateY(-2px); box-shadow: 0 4px 16px rgba(201,168,76,0.15); }
  .download-btn:active { transform: scale(0.98); }
  .download-btn.loading { opacity: 0.6; pointer-events: none; }
  .download-btn .dl-spinner { display: none; width: 15px; height: 15px; border: 2px solid rgba(201,168,76,0.3); border-top-color: var(--gold-light); border-radius: 50%; animation: spin 0.7s linear infinite; }
  .download-btn.loading .dl-spinner { display: block; }
  .download-btn.loading .dl-icon { display: none; }

  .retry-btn {
    width: 100%;
    padding: 14px;
    background: transparent;
    border: 1px solid rgba(201,168,76,0.25);
    border-radius: 12px;
    font-family: 'Cinzel', serif;
    font-size: 12px;
    letter-spacing: 2px;
    color: rgba(201,168,76,0.6);
    cursor: pointer;
    transition: all 0.3s;
    text-transform: uppercase;
  }
  .retry-btn:hover { border-color: rgba(201,168,76,0.5); color: var(--gold); background: rgba(201,168,76,0.05); }

  #toast {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: rgba(20,16,36,0.96);
    border: 1px solid rgba(201,168,76,0.5);
    border-radius: 40px;
    padding: 12px 24px;
    font-family: 'Kanit', 'Crimson Text', serif;
    font-size: 14px;
    color: var(--gold-light);
    display: flex;
    align-items: center;
    gap: 8px;
    opacity: 0;
    pointer-events: none;
    z-index: 999;
    backdrop-filter: blur(12px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.5), 0 0 20px rgba(201,168,76,0.15);
    transition: opacity 0.35s ease, transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
    white-space: nowrap;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  #toast.hide { opacity: 0; transform: translateX(-50%) translateY(10px); transition: opacity 0.3s ease, transform 0.3s ease; }

  .ornament { display: flex; align-items: center; gap: 10px; margin: 16px 0; opacity: 0.5; }
  .ornament-line { flex: 1; height: 1px; background: linear-gradient(90deg, transparent, var(--gold)); }
  .ornament-line:last-child { background: linear-gradient(90deg, var(--gold), transparent); }
  .ornament-diamond { color: var(--gold); font-size: 10px; }

  .screen { animation: fadeIn 0.5s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  .sorting-hat-screen { text-align: center; padding: 40px 20px; }
  .hat-emoji { font-size: 72px; display: block; animation: hatWiggle 0.6s ease-in-out infinite alternate; margin-bottom: 16px; }
  @keyframes hatWiggle { from { transform: rotate(-5deg) scale(1); } to { transform: rotate(5deg) scale(1.05); } }
  .thinking-dots { font-family: 'Cinzel', serif; font-size: 14px; letter-spacing: 4px; color: var(--gold); animation: pulse 1s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .score-bars { margin-top: 20px; display: flex; flex-direction: column; gap: 8px; }
  .score-bar-item { display: flex; align-items: center; gap: 8px; }
  .score-bar-label { font-family: 'Cinzel', serif; font-size: 10px; letter-spacing: 1px; width: 80px; text-align: right; color: rgba(245,232,200,0.7); }
  .score-bar-bg { flex: 1; height: 8px; background: rgba(255,255,255,0.05); border-radius: 4px; overflow: hidden; }
  .score-bar-fg { height: 100%; border-radius: 4px; transition: width 1.2s cubic-bezier(0.4,0,0.2,1); width: 0%; }
  .sbg { background: linear-gradient(90deg, #740001, #D3A625); }

// ── STARS ──
const canvas = document.getElementById('stars-canvas');
const ctx = canvas.getContext('2d');
let stars = [];
function resizeCanvas() { canvas.width=window.innerWidth; canvas.height=window.innerHeight; initStars(); }
function initStars() {
  stars=[];
  for(let i=0;i<180;i++) stars.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:Math.random()*1.5+0.2,a:Math.random(),speed:Math.random()*0.005+0.002,phase:Math.random()*Math.PI*2});
}
function drawStars(t) {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  stars.forEach(s=>{ const a=s.a*(0.5+0.5*Math.sin(t*s.speed+s.phase)); ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fillStyle=`rgba(255,240,200,${a})`; ctx.fill(); });
  requestAnimationFrame(drawStars);
}
window.addEventListener('resize',resizeCanvas);
resizeCanvas();
requestAnimationFrame(drawStars);

// ── PARTICLES ──
(function spawnParticles(){
  for(let i=0;i<12;i++){

    p.style.animationDelay=(Math.random()*8)+'s';
    p.style.animationDuration=(6+Math.random()*6)+'s';
    p.style.width=p.style.height=(2+Math.random()*4)+'px';
    document.body.appendChild(p);

})();

function getResult(){ return Object.entries(state.scores).sort((a,b)=>b[1]-a[1])[0][0]; }

    <div class="screen" style="width:100%;display:flex;flex-direction:column;align-items:center;">

// ── PARTICLES PER HOUSE ──
let particleAnimId=null;
function startHouseParticles(house){
  if(particleAnimId) cancelAnimationFrame(particleAnimId);
  const banner=document.getElementById('house-banner-main');
  const cv=document.getElementById('house-particle-canvas');
  if(!cv||!banner) return;
  cv.width=banner.offsetWidth; cv.height=banner.offsetHeight;
  const cx=cv.getContext('2d');
  let particles=[]; let shootingStars=[];

  if(house==='gryffindor'){
    function spawnFire(){ particles.push({x:Math.random()*cv.width,y:cv.height+5,vx:(Math.random()-0.5)*1.2,vy:-(Math.random()*2.5+1),size:Math.random()*6+2,life:1,decay:Math.random()*0.012+0.008,hue:Math.random()*30,type:Math.random()<0.3?'ember':'flame'}); }
    for(let i=0;i<60;i++) particles.push({x:Math.random()*cv.width,y:Math.random()*cv.height,vx:(Math.random()-0.5)*1.2,vy:-(Math.random()*2.5+1),size:Math.random()*6+2,life:Math.random(),decay:Math.random()*0.012+0.008,hue:Math.random()*30,type:Math.random()<0.3?'ember':'flame'});
    function drawFire(ts){
      particleAnimId=requestAnimationFrame(drawFire); cx.clearRect(0,0,cv.width,cv.height);
      if(Math.random()<0.6) spawnFire();
      particles.forEach(p=>{ p.x+=p.vx+Math.sin(ts*0.002+p.y*0.05)*0.4; p.y+=p.vy; p.life-=p.decay; p.size*=0.997;
        if(p.life<=0){ p.x=Math.random()*cv.width; p.y=cv.height+5; p.life=1; p.size=Math.random()*6+2; }
        const a=Math.max(0,p.life);
        if(p.type==='ember'){ cx.save(); cx.globalAlpha=a*0.9; cx.fillStyle=`hsl(${p.hue+20},100%,70%)`; cx.shadowColor=`hsl(${p.hue},100%,60%)`; cx.shadowBlur=8; cx.beginPath(); cx.arc(p.x,p.y,p.size*0.5,0,Math.PI*2); cx.fill(); cx.restore(); }
        else{ cx.save(); cx.globalAlpha=a*0.55; const g=cx.createRadialGradient(p.x,p.y,0,p.x,p.y-p.size,p.size*1.5); g.addColorStop(0,`hsla(${p.hue+40},100%,80%,1)`); g.addColorStop(0.4,`hsla(${p.hue+10},100%,55%,0.8)`); g.addColorStop(1,`hsla(${p.hue},100%,30%,0)`); cx.fillStyle=g; cx.beginPath(); cx.ellipse(p.x,p.y,p.size*0.6,p.size*1.2,0,0,Math.PI*2); cx.fill(); cx.restore(); }
      });
    } drawFire(0);
  }
  else if(house==='hufflepuff'){
    for(let i=0;i<50;i++) particles.push({x:Math.random()*cv.width,y:Math.random()*cv.height,vx:(Math.random()-0.5)*0.4,vy:-(Math.random()*0.6+0.2),r:Math.random()*8+3,life:Math.random(),decay:Math.random()*0.004+0.002,hue:Math.random()*40+30,wobble:Math.random()*Math.PI*2,wobbleSpeed:Math.random()*0.03+0.01,type:Math.random()<0.4?'petal':'bubble'});
    function drawHuff(ts){
      particleAnimId=requestAnimationFrame(drawHuff); cx.clearRect(0,0,cv.width,cv.height);
      if(Math.random()<0.25) particles.push({x:Math.random()*cv.width,y:cv.height+10,vx:(Math.random()-0.5)*0.4,vy:-(Math.random()*0.6+0.2),r:Math.random()*8+3,life:1,decay:Math.random()*0.004+0.002,hue:Math.random()*40+30,wobble:Math.random()*Math.PI*2,wobbleSpeed:Math.random()*0.03+0.01,type:Math.random()<0.4?'petal':'bubble'});
      particles.forEach(p=>{ p.wobble+=p.wobbleSpeed; p.x+=p.vx+Math.sin(p.wobble)*0.5; p.y+=p.vy; p.life-=p.decay;
        if(p.life<=0){ p.x=Math.random()*cv.width; p.y=cv.height+10; p.life=1; }
        const a=Math.max(0,p.life);
        if(p.type==='bubble'){ cx.save(); cx.globalAlpha=a*0.6; const g=cx.createRadialGradient(p.x-p.r*0.3,p.y-p.r*0.3,0,p.x,p.y,p.r); g.addColorStop(0,`hsla(${p.hue+20},100%,95%,0.8)`); g.addColorStop(0.5,`hsla(${p.hue},90%,70%,0.4)`); g.addColorStop(1,`hsla(${p.hue},80%,50%,0)`); cx.fillStyle=g; cx.beginPath(); cx.arc(p.x,p.y,p.r,0,Math.PI*2); cx.fill(); cx.strokeStyle=`hsla(${p.hue+10},100%,80%,${a*0.5})`; cx.lineWidth=0.5; cx.stroke(); cx.restore(); }
        else{ cx.save(); cx.globalAlpha=a*0.7; cx.translate(p.x,p.y); cx.rotate(p.wobble); cx.fillStyle=`hsla(${p.hue},90%,75%,0.8)`; cx.shadowColor=`hsla(${p.hue},100%,80%,0.5)`; cx.shadowBlur=6; cx.beginPath(); cx.ellipse(0,-p.r*0.5,p.r*0.5,p.r,0.3,0,Math.PI*2); cx.fill(); cx.restore(); }
      });
    } drawHuff(0);
  }
  else if(house==='ravenclaw'){
    for(let i=0;i<55;i++) particles.push({x:Math.random()*cv.width,y:Math.random()*cv.height,r:Math.random()*2.5+0.5,phase:Math.random()*Math.PI*2,speed:Math.random()*0.04+0.01,hue:Math.random()*60+190,life:1,twinkle:Math.random()<0.4});
    function spawnShooter(){ shootingStars.push({x:Math.random()*cv.width*1.5-cv.width*0.25,y:Math.random()*cv.height*0.4,vx:Math.random()*6+3,vy:Math.random()*3+1.5,len:Math.random()*80+40,life:1,decay:Math.random()*0.025+0.015,hue:Math.random()*60+190}); }
    function drawRaven(ts){
      particleAnimId=requestAnimationFrame(drawRaven); cx.clearRect(0,0,cv.width,cv.height);
      if(Math.random()<0.012) spawnShooter();
      shootingStars=shootingStars.filter(s=>s.life>0);
      shootingStars.forEach(s=>{ s.x+=s.vx; s.y+=s.vy; s.life-=s.decay; const a=Math.max(0,s.life); const g=cx.createLinearGradient(s.x,s.y,s.x-s.vx*s.len/6,s.y-s.vy*s.len/6); g.addColorStop(0,`hsla(${s.hue},100%,90%,${a})`); g.addColorStop(1,`hsla(${s.hue},100%,70%,0)`); cx.save(); cx.strokeStyle=g; cx.lineWidth=2; cx.globalAlpha=a; cx.shadowColor=`hsl(${s.hue},100%,80%)`; cx.shadowBlur=8; cx.beginPath(); cx.moveTo(s.x,s.y); cx.lineTo(s.x-s.vx*(s.len/6),s.y-s.vy*(s.len/6)); cx.stroke(); cx.fillStyle=`hsla(${s.hue},100%,95%,${a})`; cx.beginPath(); cx.arc(s.x,s.y,2,0,Math.PI*2); cx.fill(); cx.restore(); });
      particles.forEach(p=>{ const blink=0.5+0.5*Math.sin(ts*p.speed+p.phase); const a=p.twinkle?blink*0.9:0.6; const r=p.twinkle?p.r*(0.7+0.5*blink):p.r; cx.save(); cx.globalAlpha=a; cx.shadowColor=`hsl(${p.hue},100%,80%)`; cx.shadowBlur=p.twinkle?12*blink:4; cx.fillStyle=`hsl(${p.hue},80%,85%)`; cx.translate(p.x,p.y); cx.beginPath(); for(let k=0;k<4;k++){ const ang=(k/4)*Math.PI*2; const ia=ang+Math.PI/4; const or=r*2.5; const ir=r*0.8; if(k===0) cx.moveTo(Math.cos(ang)*or,Math.sin(ang)*or); else cx.lineTo(Math.cos(ang)*or,Math.sin(ang)*or); cx.lineTo(Math.cos(ia)*ir,Math.sin(ia)*ir); } cx.closePath(); cx.fill(); cx.restore(); });
    } drawRaven(0);
  }
  else if(house==='slytherin'){
    for(let i=0;i<45;i++) particles.push({x:Math.random()*cv.width,y:Math.random()*cv.height,vx:(Math.random()-0.5)*0.5,vy:(Math.random()-0.5)*0.3,r:Math.random()*18+6,life:Math.random(),decay:Math.random()*0.005+0.002,phase:Math.random()*Math.PI*2,speed:Math.random()*0.02+0.005,hue:Math.random()*30+100,sat:Math.random()*40+50,bright:Math.random()*20+30});
    const wisps=Array.from({length:3},(_,wi)=>({nodes:Array.from({length:12},()=>({x:Math.random()*cv.width,y:Math.random()*cv.height})),angle:Math.random()*Math.PI*2,speed:Math.random()*0.008+0.004,hue:120+Math.random()*20}));
    function drawSlytherin(ts){
      particleAnimId=requestAnimationFrame(drawSlytherin); cx.clearRect(0,0,cv.width,cv.height);
      particles.forEach(p=>{ p.phase+=p.speed; p.x+=p.vx+Math.cos(p.phase)*0.4; p.y+=p.vy+Math.sin(p.phase*0.7)*0.3; p.life-=p.decay; if(p.x<-p.r) p.x=cv.width+p.r; if(p.x>cv.width+p.r) p.x=-p.r; if(p.life<=0){ p.life=1; p.y=Math.random()*cv.height; } const a=Math.max(0,Math.min(1,p.life))*0.35; cx.save(); cx.globalAlpha=a; const g=cx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.r); g.addColorStop(0,`hsla(${p.hue},${p.sat+20}%,${p.bright+30}%,0.8)`); g.addColorStop(0.5,`hsla(${p.hue},${p.sat}%,${p.bright}%,0.4)`); g.addColorStop(1,`hsla(${p.hue},${p.sat-10}%,${p.bright}%,0)`); cx.fillStyle=g; cx.shadowColor=`hsl(${p.hue},80%,40%)`; cx.shadowBlur=12; cx.beginPath(); cx.arc(p.x,p.y,p.r,0,Math.PI*2); cx.fill(); cx.restore(); });
      wisps.forEach((w,wi)=>{ w.angle+=w.speed+Math.sin(ts*0.001+wi)*0.005; const head=w.nodes[0]; head.x+=Math.cos(w.angle+Math.sin(ts*0.0015+wi*2)*0.8)*1.5; head.y+=Math.sin(w.angle+Math.cos(ts*0.001+wi*1.5)*0.6)*1.2; if(head.x<0) head.x=cv.width; if(head.x>cv.width) head.x=0; if(head.y<0) head.y=cv.height; if(head.y>cv.height) head.y=0; for(let ni=w.nodes.length-1;ni>0;ni--){ const curr=w.nodes[ni],prev=w.nodes[ni-1]; curr.x+=(prev.x-curr.x)*0.18; curr.y+=(prev.y-curr.y)*0.18; } cx.save(); cx.lineWidth=2; cx.lineCap='round'; cx.lineJoin='round'; cx.shadowColor=`hsl(${w.hue},100%,55%)`; cx.shadowBlur=14; w.nodes.forEach((node,ni)=>{ const frac=1-ni/w.nodes.length; cx.globalAlpha=frac*0.65; cx.strokeStyle=`hsla(${w.hue+ni*3},100%,${55+ni*2}%,${frac})`; cx.beginPath(); if(ni>0){ cx.moveTo(w.nodes[ni-1].x,w.nodes[ni-1].y); cx.lineTo(node.x,node.y); cx.stroke(); } if(ni===0){ cx.globalAlpha=0.9; cx.fillStyle=`hsl(${w.hue},100%,80%)`; cx.shadowBlur=18; cx.beginPath(); cx.arc(node.x,node.y,3,0,Math.PI*2); cx.fill(); } }); cx.restore(); });
    } drawSlytherin(0);
  }
}

// ── ACTIONS ──
function startQuiz(){ state={screen:'quiz',currentQ:0,selected:null,answers:[],scores:{gryffindor:0,hufflepuff:0,ravenclaw:0,slytherin:0},result:null}; render(); }

function selectOption(house,el){
  document.querySelectorAll('.option-btn').forEach(b=>b.classList.remove('selected'));
  el.classList.add('selected'); state.selected=house;
  const btn=document.getElementById('next-btn');
  if(btn){
    btn.classList.remove('disabled-state');
    btn.classList.add('visible');
  }
}

function highlightStart(el){
  // Deselect all house cards then highlight clicked
  document.querySelectorAll('.house-mini').forEach(c=>c.classList.remove('selected-house'));
  el.classList.add('selected-house');
  // Neon glow the start button
  const btn=document.getElementById('start-btn');
  if(btn) btn.classList.add('neon');
}

function nextQuestion(){
  if(!state.selected) return;
  state.scores[state.selected]++; state.answers.push(state.selected); state.selected=null;
  if(state.currentQ<4){ state.currentQ++; const card=document.querySelector('.card'); if(card){ card.classList.add('slide-out-left'); setTimeout(()=>render(),350); } else render(); }
  else{ state.screen='sorting'; render(); }
}

// ── TOAST ──
let toastTimer=null;
function showToast(icon,msg){
  const el=document.getElementById('toast'); if(!el) return;
  el.innerHTML=`<span>${icon}</span><span>${msg}</span>`; el.classList.remove('hide'); el.classList.add('show');
  if(toastTimer) clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>{ el.classList.remove('show'); el.classList.add('hide'); },3000);
}

    traits.forEach((tr,i)=>{ const pw=pws[i]; ctx.save(); ctx.fillStyle=hc.pillBg; ctx.globalAlpha=0.85; ctx.beginPath(); ctx.roundRect(px,py-PH/2,pw,PH,PR); ctx.fill(); ctx.strokeStyle=hc.accent; ctx.lineWidth=1.5; ctx.globalAlpha=0.5; ctx.stroke(); ctx.restore(); ctx.save(); ctx.font=pf; ctx.fillStyle=hc.accent; ctx.globalAlpha=0.95; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(tr,px+pw/2,py); ctx.restore(); px+=pw+PG; }); ctx.restore();
    ctx.save(); ctx.strokeStyle=hc.accent; ctx.globalAlpha=0.18; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(130,1100); ctx.lineTo(W-130,1100); ctx.stroke(); ctx.restore();
    const df=`${lang==='th'?'400':'normal'} 40px ${lang==='th'?'Arial':'Georgia'},serif`; const dls=wrapText(houseData.desc,W-200,df); ctx.save(); ctx.font=df; ctx.fillStyle='rgba(245,232,200,0.8)'; ctx.textAlign='center'; ctx.textBaseline='top'; ctx.globalAlpha=1; const dlh=lang==='th'?62:56; dls.forEach((line,i)=>ctx.fillText(line,W/2,1125+i*dlh)); ctx.restore();
    const divY=H-260; ctx.save(); ctx.strokeStyle=hc.accent; ctx.globalAlpha=0.25; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(130,divY); ctx.lineTo(W-130,divY); ctx.stroke(); dt('✦',W/2,divY,'36px serif',hc.accent,0.45); ctx.restore();
    dt('🎩 hogwarts-quiz-ivory.vercel.app',W/2,H-195,'40px Arial,sans-serif',hc.accent,0.55);
    dt('#HogwartsQuiz  #WizardingWorld  #SortingHat',W/2,H-130,'32px Arial,sans-serif','rgba(245,232,200,0.35)',1);
    dt('Created by Numchai Ncs',W/2,H-68,'28px Arial,sans-serif',hc.accent,0.38);
    resolve(c);
  });
}

// ── INVITE MUGGLES ──
async function inviteMuggles(){
  const QUIZ_URL='https://hogwarts-quiz-ivory.vercel.app/';
  const shareText=LANG.current==='th'?'🎩 มาลองดูกันสิว่าคุณจะได้อยู่บ้านไหนในฮอกวอตส์!':'🎩 Find out which Hogwarts house you belong to!';
  if(navigator.share){ try{ await navigator.share({title:'Hogwarts Sorting Quiz',text:shareText,url:QUIZ_URL}); return; }catch(e){ if(e.name==='AbortError') return; } }
  try{ await navigator.clipboard.writeText(QUIZ_URL); showToast('🧙',LANG.current==='th'?'คัดลอกลิ้งค์แล้ว! ส่งให้มักเกิลได้เลย':'Link copied! Send it to your muggle friends'); }catch{ window.prompt('Copy this link:',QUIZ_URL); }
}

// ── DOWNLOAD CARD ──
async function downloadCard(house){
  const btn=document.getElementById('download-btn-main');
  if(btn){ btn.classList.add('loading'); const sp=btn.querySelector('span'); if(sp) sp.textContent=LANG.current==='th'?'กำลังสร้างการ์ด...':'Creating card...'; }
  function resetBtn(){ if(!btn) return; btn.classList.remove('loading'); const sp=btn.querySelector('span'); if(sp) sp.textContent=LANG.current==='th'?'📸 แชร์การ์ดของคุณ':'📸 Save Your House Card'; }
  try{
    const cv=await generateRichCard(house); const blob=await new Promise(res=>cv.toBlob(res,'image/png')); const file=new File([blob],`hogwarts-${house}-card.png`,{type:'image/png'});
    if(navigator.share&&navigator.canShare&&navigator.canShare({files:[file]})){ resetBtn(); try{ await navigator.share({files:[file],title:'Hogwarts Sorting Quiz',text:LANG.current==='th'?`ฉันได้บ้าน ${TEXT[LANG.current].houses[house].name} ในฮอกวอตส์! 🎩`:`I got sorted into ${TEXT.en.houses[house].name} at Hogwarts! 🎩`}); return; }catch(e){ if(e.name==='AbortError'){resetBtn();return;} } }
    resetBtn(); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=`hogwarts-${house}-card.png`; a.click(); URL.revokeObjectURL(a.href);
    showToast('📸',LANG.current==='th'?'บันทึกการ์ดลงเครื่องแล้ว!':'Card saved to your device!');
  }catch(err){ resetBtn(); showToast('⚠️',LANG.current==='th'?'เกิดข้อผิดพลาด ลองใหม่อีกครั้ง':'Something went wrong, please try again'); }
}

// ── RETAKE ──
function retake(){
  if(particleAnimId){cancelAnimationFrame(particleAnimId);particleAnimId=null;}
  state={screen:'intro',currentQ:0,selected:null,answers:[],scores:{gryffindor:0,hufflepuff:0,ravenclaw:0,slytherin:0},result:null};
  render();
}

document.getElementById('lang-btn').addEventListener('click',()=>{
  LANG.current=LANG.current==='en'?'th':'en';
  document.getElementById('lang-btn').textContent=LANG.current==='en'?'TH / EN':'EN / TH';
  document.body.style.fontFamily=LANG.current==='th'?"'Kanit','Crimson Text',serif":"'Crimson Text','Kanit',serif";
  render();
});

render();
